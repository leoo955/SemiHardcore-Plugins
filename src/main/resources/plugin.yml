      moderation.sethome: true
      moderation.home: true
      moderation.delhome: true
      moderation.homes: true
      moderation.invsee: true
      moderation.broadcast: true
      moderation.xray.alerts: true
      moderation.topluck: true
      moderation.spec: true
      moderation.auth: true
      moderation.skin: true
      moderation.jail: true
      moderation.setjail: true
      moderation.coreprotect: true
      moderation.deathdim: true
      moderation.deathdim.bypass: true
      moderation.gethead: true
      moderation.guister: true
      moderation.heal: true
      moderation.feed: true
      moderation.fly: true
      moderation.speed: true
      moderation.god: true
      moderation.clear: true
      moderation.gamemode: true
      moderation.back: true
      moderation.tpall: true
