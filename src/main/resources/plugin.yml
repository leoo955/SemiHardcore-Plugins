name: ModerationSMP
version: '${project.version}'
main: fr.moderation.ModerationSMP
api-version: '1.21'
author: YourName
description: Plugin de modération complet avec système de mort et puzzles
softdepend: [CoreProtect, WorldEdit]

commands:
  vanish:
    description: Active ou désactive le mode vanish basique
    usage: /<command>
    permission: moderation.vanish
    
  supervanish:
    description: Active ou désactive le mode supervanish (vanish avancé)
    usage: /<command>
    permission: moderation.supervanish
    
  spawn:
    description: Téléporte au spawn du serveur
    usage: /<command>
    permission: moderation.spawn
    
  setspawn:
    description: Définit la position du spawn
    usage: /<command>
    permission: moderation.setspawn
    
  tpa:
    description: Envoie une demande de téléportation à un joueur
    usage: /<command> <joueur>
    permission: moderation.tpa
    
  tpaccept:
    description: Accepte une demande de téléportation
    usage: /<command>
    permission: moderation.tpa
    
  tpdeny:
    description: Refuse une demande de téléportation
    usage: /<command>
    permission: moderation.tpa
    
  tphere:
    description: Téléporte un joueur vers vous
    usage: /<command> <joueur>
    permission: moderation.tphere
    
  sethome:
    description: Définit un home à votre position actuelle
    usage: /<command> [nom]
    permission: moderation.sethome
    
  home:
    description: Téléporte vers un de vos homes
    usage: /<command> [nom]
    permission: moderation.home
    
  delhome:
    description: Supprime un de vos homes
    usage: /<command> <nom>
    permission: moderation.delhome
    
  homes:
    description: Liste tous vos homes
    usage: /<command>
    permission: moderation.homes
    
  invsee:
    description: Ouvre l'inventaire d'un autre joueur
    usage: /<command> <joueur>
    permission: moderation.invsee
    
  broadcast:
    description: Diffuse un message à tous les joueurs
    usage: /<command> <message>
    permission: moderation.broadcast
    aliases: [bc]
    
  xray:
    description: Gère le système anti-xray
    usage: /<command> alerts
    permission: moderation.xray.alerts
    
  topluck:
    description: Affiche les statistiques de minage (Top Luck)
    usage: /<command>
    permission: moderation.topluck
    
  spec:
    description: Bascule en mode spectateur (Xray Admin)
    usage: /<command>
    permission: moderation.spec
    
  register:
    description: S'enregistrer sur le serveur
    usage: /<command> <mdp> <mdp>
    permission: moderation.auth
    aliases: [reg]
    
  login:
    description: Se connecter au serveur
    usage: /<command> <mdp>
    permission: moderation.auth
    aliases: [l]
    
  skin:
    description: Changer de skin
    usage: /<command> <pseudo>
    permission: moderation.skin
    
  jail:
    description: Emprisonne un joueur dans une prison
    usage: /<command> <joueur> <prison> <temps> [raison]
    permission: moderation.jail
    
  unjail:
    description: Libère un joueur de prison
    usage: /<command> <joueur>
    permission: moderation.jail
    
  setjail:
    description: Définit l'emplacement d'une prison
    usage: /<command> <nom>
    permission: moderation.setjail
    
  co:
    description: Commandes de rollback/restore
    usage: /<command> <rollback|restore> t:<temps> r:<rayon> [u:<utilisateur>]
    permission: moderation.coreprotect
    aliases: [coreprotect]
    
  deathdim:
    description: Gère le monde de la mort
    usage: /<command> <tp|setspawn|reset|info|reload>
    permission: moderation.deathdim
    aliases: [dd, deathworld]
    
  gethead:
    description: Obtient la tête d'un joueur pour le rituel
    usage: /<command> <joueur>
    permission: moderation.gethead
    
  team:
    description: Gestion des équipes
    usage: /<command> <setleader|invite|accept|deny|add|kick|transfer|leave|list|chat|info|sethome|delhome|home|resign>
    permission: moderation.team
    
  guister:
    description: Gérer le rôle Guister
    usage: /<command> <add|remove|list> [joueur]
    permission: moderation.guister
    
  pvp:
    description: Active/Désactive le PVP sur le serveur
    usage: /<command> [on|off]
    permission: moderation.pvp
    
  structure:
    description: Gestion des structures WorldEdit
    usage: /<command> <save|load|list|setpuzzle> [args]
    permission: moderation.structure
    
  noclip:
    description: Active/Désactive le mode noclip (traverser les blocs)
    usage: /<command>
    permission: moderation.noclip
    
  heal:
    description: Soigne un joueur (vie et nourriture)
    usage: /<command> [joueur]
    permission: moderation.heal
    
  feed:
    description: Restaure la nourriture d'un joueur
    usage: /<command> [joueur]
    permission: moderation.feed
    
  fly:
    description: Active/Désactive le vol pour un joueur
    usage: /<command> [joueur]
    permission: moderation.fly
    
  speed:
    description: Modifie la vitesse de déplacement
    usage: /<command> <1-10>
    permission: moderation.speed
    
  god:
    description: Active/Désactive le mode invincibilité
    usage: /<command> [joueur]
    permission: moderation.god
    
  clear:
    description: Vide l'inventaire d'un joueur
    usage: /<command> [joueur]
    permission: moderation.clear
    
  gamemode:
    description: Change le mode de jeu
    usage: /<command> <mode> [joueur]
    permission: moderation.gamemode
    aliases: [gm]
    
  back:
    description: Retourne à la position précédente
    usage: /<command>
    permission: moderation.back
    
  tpall:
    description: Téléporte tous les joueurs vers vous
    usage: /<command>
    permission: moderation.tpall
    
  tppos:
    description: Téléportation à des coordonnées
    usage: /<command> <x> <y> <z> [world]
    permission: moderation.tppos
    
  freeze:
    description: Gèle un joueur (empêche tout mouvement)
    usage: /<command> <joueur>
    permission: moderation.freeze
    
  rtp:
    description: Téléportation aléatoire dans le monde
    usage: /<command>
    permission: moderation.rtp
    aliases: [wild, randomtp]
    
  scoreboard:
    description: Affiche/cache le scoreboard
    usage: /<command> [toggle]
    permission: moderation.scoreboard
    aliases: [sb]
    
  balance:
    description: Affiche votre solde
    usage: /<command>
    permission: moderation.balance
    aliases: [bal, money]
    
  pay:
    description: Envoyer de l'argent à un joueur
    usage: /<command> <joueur> <montant>
    permission: moderation.pay
    
  eco:
    description: Gérer l'économie (admin)
    usage: /<command> <give|take|set|reset> <joueur> [montant]
    permission: moderation.eco
    aliases: [economy]
    
  ah:
    description: Auction House - Acheter et vendre des items
    usage: /<command> [sell <prix>|listings|expired]
    permission: moderation.ah
    aliases: [auctions, auctionhouse]
    
  shop:
    description: Shop du serveur - Acheter des items
    usage: /<command>
    permission: moderation.shop
    aliases: [boutique, magasin]
    
  jobs:
    description: Système de jobs et métiers
    usage: /<command> [stats|info <job>]
    permission: moderation.jobs
    aliases: [job, métier, metier]
    
  fantome:
    description: Passer en mode fantôme (spectateur) dans le monde réel
    usage: /<command>
    permission: moderation.fantome
    aliases: [ghost]
    
