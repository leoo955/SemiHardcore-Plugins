# Paramètres
settings:
  # Délai d'expiration des demandes TPA (en secondes)
  tpa_timeout: 30
  
  # Nombre maximum de homes par joueur
  max_homes: 3
  
  # ========== VANISH ==========
  
  # Appliquer l'effet d'invisibilité visuel (optionnel)
  vanish_invisibility_effect: false
  
  # Empêcher les dégâts sur les joueurs vanish
  vanish_no_damage: false
  
  # ========== SUPERVANISH ==========
  
  # Cacher les messages de join/quit
  supervanish_hide_join_quit: true
  
  # Désactiver le pickup d'items
  supervanish_disable_pickup: true
  
  # Désactiver les dégâts donnés
  supervanish_disable_damage: true
  
  # Désactiver la casse de blocs
  supervanish_disable_block_break: false
  
  # Désactiver la pose de blocs
  supervanish_disable_block_place: false
  
  # Activer la vision nocturne
  supervanish_night_vision: true
  
  # Empêcher la perte de faim
  # Empêcher la perte de faim
  supervanish_no_hunger: true

# Configuration Chat
chat:
  proximity-radius: 100.0
  shout-prefix: "!"

# Configuration PVP
pvp:
  enabled: true

# Configuration Xray (Blocs par minute avant alerte)
xray:
  ores:
    DIAMOND_ORE: 5
    DEEPSLATE_DIAMOND_ORE: 5
    ANCIENT_DEBRIS: 3
    GOLD_ORE: 10
    DEEPSLATE_GOLD_ORE: 10
    EMERALD_ORE: 5
    DEEPSLATE_EMERALD_ORE: 5

# Position du spawn (géré automatiquement)
spawn:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0
  set: false

# Configuration du monde de la mort
death-dimension:
  # Activer ou désactiver le système
  enabled: true
  
  # Nom du monde
  world-name: death_world
  
  # Conserver l'inventaire lors de la téléportation
  keep-inventory: true
  
  # Position de spawn dans le monde de la mort
  spawn:
    x: 0.0
    y: 100.0
    z: 0.0

